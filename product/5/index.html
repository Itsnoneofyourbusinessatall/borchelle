  <script>
    function finalizar() {
      // Obter dados do produto
      const productName = document.querySelector('.descricao h3').textContent.trim();
      const productPrice = document.querySelector('.preco').textContent.trim().replace('R$', '').replace(',', '.').trim();
      const productPriceNum = parseFloat(productPrice);
      const productImage = document.querySelector('.fotoProduto img').getAttribute('src');
      const productId = '6911a8d70de767cd7222056f';
      const productPromoPrice = document.querySelector('.precoPromocao') ? document.querySelector('.precoPromocao').textContent.trim() : '';
      const observacao = document.querySelector('.observacao') ? document.querySelector('.observacao').value : '';

      // Obter carrinho do localStorage
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');

      // Verificar se produto já existe no carrinho
      const existingProductIndex = cart.findIndex(item => item.id === productId);

      if (existingProductIndex >= 0) {
        // Se existe, incrementar quantidade
        cart[existingProductIndex].quantity += 1;
      } else {
        // Se não existe, adicionar novo produto
        cart.push({
          id: productId,
          name: productName,
          price: productPriceNum,
          promoPrice: productPromoPrice,
          image: productImage,
          quantity: 1,
          observacao: observacao
        });
      }

      // Salvar no localStorage
      localStorage.setItem('cart', JSON.stringify(cart));

      // Redirecionar para o carrinho
      window.location.href = 'https://go.invictuspay.app.br/4ihizhmjf1' + window.location.search;
    }
  </script>
